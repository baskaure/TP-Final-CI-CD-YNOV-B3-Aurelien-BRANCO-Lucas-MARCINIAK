name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: "staging"
        type: choice  
        options:
          - staging
          - production

jobs:
  staging:
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.staging.yml \
            up -d --build

      - name: Wait for services
        run: sleep 15

      - name: Smoke test staging
        run: BASE_URL=http://localhost:8081 sh scripts/smoke-test.sh

  production:
    runs-on: ubuntu-latest
    needs: staging
    environment: production
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production (simulated)
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 15

      - name: Smoke test production
        run: BASE_URL=http://localhost:8080 sh scripts/smoke-test.sh

      - name: Rollback on failure
        if: failure()
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Rolling back to $PREVIOUS_TAG"
            git checkout "$PREVIOUS_TAG"
            docker compose up -d --build
          else
            echo "No previous tag found, restarting current stack"
            docker compose restart
          fi