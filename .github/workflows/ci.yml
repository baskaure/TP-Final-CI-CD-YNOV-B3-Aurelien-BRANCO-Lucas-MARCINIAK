name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Raison du déclenchement manuel"
        required: false
        default: "Test manuel"

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shoplite_test
          POSTGRES_USER: shoplite
          POSTGRES_PASSWORD: shoplite_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shoplite -d shoplite_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://shoplite:shoplite_password@localhost:5432/shoplite_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Init test database
        run: psql "$DATABASE_URL" -f ../database/init.sql

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node${{ matrix.node-version }}
          path: api/coverage/
          retention-days: 7

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Check outdated dependencies
        run: npm outdated || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  security:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t shoplite-api:scan ./api

      - name: Scan image avec Trivy
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: shoplite-api:scan
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Rapport Trivy (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: shoplite-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload rapport Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 7